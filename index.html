<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="HandClash.png">
    <title>HandClash</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-bg: #eef4fb;
            --card-bg: #ffffff;
            --card-border: rgba(38, 123, 181, 0.12);
            --primary: #267bb5;
            --primary-dark: #1a5d8b;
            --text: #1f2937;
            --text-muted: #6b7280;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-card: 0 1px 3px rgba(0,0,0,0.06);
        }
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            font-family: 'Baloo 2', cursive;
            background: var(--app-bg);
            -webkit-font-smoothing: antialiased;
        }
        body > .container {
            flex: 1;
            width: 100%;
            box-sizing: border-box;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 16px;
            width: 100%;
            max-width: none;
            padding: 20px;
            box-sizing: border-box;
        }
        .content-inner {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        /* Hero-Zeile: Begrüßung und Team je 50 % inkl. Abstand */
        .hero-row {
            display: flex;
            flex-wrap: nowrap;
            gap: 16px;
            align-items: flex-start;
        }
        .hero-row .greeting-wrap,
        .hero-row .team-card {
            flex: 1 1 0;
            min-width: 0;
            align-self: flex-start;
            padding: 8px 12px;
            min-height: 0;
        }
        .hero-row .greeting-wrap .greeting {
            font-size: 1.15em;
            margin: 0 0 2px 0;
            line-height: 1.25;
        }
        .hero-row .greeting-wrap .greeting-sub {
            font-size: 0.9em;
            margin: 0;
            line-height: 1.25;
        }
        .hero-row .team-card .home-section-title {
            margin: 0 0 2px 0;
            font-size: 0.75em;
            line-height: 1.2;
        }
        .hero-row .team-card .home-section-value {
            font-size: 1em;
            line-height: 1.25;
        }
        /* Greeting – Hero-Karte */
        .greeting-wrap {
            background: linear-gradient(135deg, #e8f2fc 0%, #f0f7ff 100%);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 14px 16px;
            box-shadow: var(--shadow-card);
        }
        .greeting {
            font-size: 1.25em;
            color: var(--text);
            margin: 0 0 4px 0;
            font-weight: 700;
            line-height: 1.3;
        }
        .greeting .greeting-name {
            color: var(--primary);
        }
        .greeting-sub {
            font-size: 0.95em;
            color: var(--text-muted);
            margin: 0;
        }
        /* Sektionen als Karten */
        .home-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow-card);
        }
        .home-section-title {
            font-size: 0.8em;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin: 0 0 8px 0;
        }
        .home-section.ranking-section {
            padding: 18px 20px;
            min-height: 200px;
            flex: 1 1 auto;
            width: 100%;
            box-sizing: border-box;
        }
        .home-section.ranking-section .home-section-title {
            margin: 0 0 12px 0;
        }
        .home-section-value {
            font-size: 1.15em;
            font-weight: 700;
            color: var(--text);
        }
        /* Team-Karte: Wert hervorgehoben */
        .home-section.team-card .home-section-value {
            color: var(--primary);
            font-size: 1.2em;
        }
        /* Ranking-Liste */
        .ranking-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .ranking-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 12px;
            margin: 0 -12px;
            border-radius: var(--radius-sm);
            font-size: 1.05em;
            transition: background 0.15s ease;
        }
        .ranking-list li:hover {
            background: #f8fafc;
        }
        .ranking-list li:first-child {
            background: rgba(38, 123, 181, 0.06);
        }
        .ranking-list .rank-icon {
            margin-right: 10px;
            font-size: 1.2em;
        }
        .ranking-list .rank-name {
            flex: 1;
            font-weight: 500;
            color: var(--text);
        }
        .ranking-list .rank-count {
            font-weight: 700;
            color: var(--primary);
            min-width: 1.5em;
            text-align: right;
        }
        .ranking-empty {
            padding: 24px 0;
            text-align: center;
            font-size: 0.95em;
            color: var(--text-muted);
        }
        /* Buttons – volle Breite */
        .btn {
            width: 100%;
            min-height: 52px;
            box-sizing: border-box;
            text-decoration: none;
            padding: 16px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            font-size: 1.15em;
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(38, 123, 181, 0.35);
        }
        .btn:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(38, 123, 181, 0.4);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:focus {
            outline: 3px solid rgba(38, 123, 181, 0.4);
            outline-offset: 2px;
        }
        .btn.btn-primary {
            margin-top: 4px;
        }
        .btn-secondary {
            background: var(--card-bg);
            color: var(--primary);
            border: 2px solid var(--primary);
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: #e8f2fc;
        }
    </style>
</head>
<body>
    <div id="app-nav"></div>
    <div class="container">
        <div class="content-inner">
            <div class="hero-row">
                <div id="greetingWrap" class="greeting-wrap" style="display:none;">
                    <p id="greeting" class="greeting"></p>
                    <p id="greetingSub" class="greeting-sub">Bereit für eine Runde?</p>
                </div>
                <div id="teamSection" class="home-section team-card" style="display:none;">
                    <p class="home-section-title">👥 Team</p>
                    <p id="teamName" class="home-section-value"></p>
                </div>
            </div>
            <a href="login.html?redirect=index.html" class="btn btn-secondary" id="btnAnmelden" style="display:none;">Anmelden</a>
            <a href="ermitteln.html" class="btn btn-primary" id="btnVariante" style="display:none;">Jetzt spielen</a>
        </div>
        <div id="rankingSection" class="home-section ranking-section" style="display:none;">
            <p class="home-section-title">🏆 Niederlagen heute</p>
            <ul id="rankingList" class="ranking-list"></ul>
            <p id="rankingEmpty" class="ranking-empty" style="display:none;">Noch keine Runden heute gespielt.</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="nav.js"></script>
    <script>
        (function () {
            var btnAnmelden = document.getElementById("btnAnmelden");
            var btnVariante = document.getElementById("btnVariante");
            var greetingEl = document.getElementById("greeting");
            var greetingWrap = document.getElementById("greetingWrap");
            var teamSection = document.getElementById("teamSection");
            var teamNameEl = document.getElementById("teamName");
            var rankingSection = document.getElementById("rankingSection");
            var rankingList = document.getElementById("rankingList");
            var rankingEmpty = document.getElementById("rankingEmpty");

            var rankIcons = ["🥇", "🥈", "🥉", "💀"];

            function escapeHtml(s) {
                if (!s) return "";
                var div = document.createElement("div");
                div.textContent = s;
                return div.innerHTML;
            }

            function getCurrentTeam() {
                try {
                    var s = localStorage.getItem("ssp_current_team");
                    return s ? JSON.parse(s) : null;
                } catch (e) { return null; }
            }

            function updateTeamSection() {
                var team = getCurrentTeam();
                if (team && team.name) {
                    teamNameEl.textContent = team.name;
                    teamSection.style.display = "block";
                } else {
                    teamSection.style.display = "none";
                }
            }

            function renderRanking(items) {
                rankingList.innerHTML = "";
                if (!items || items.length === 0) {
                    rankingEmpty.style.display = "block";
                    rankingList.style.display = "none";
                } else {
                    rankingEmpty.style.display = "none";
                    rankingList.style.display = "";
                    items.forEach(function (item, i) {
                        var icon = rankIcons[Math.min(i, rankIcons.length - 1)];
                        var li = document.createElement("li");
                        li.innerHTML = "<span class=\"rank-icon\">" + icon + "</span><span class=\"rank-name\">" + escapeHtml(item.name) + "</span><span class=\"rank-count\">" + escapeHtml(String(item.defeats)) + "</span>";
                        rankingList.appendChild(li);
                    });
                }
            }

            function loadRankingToday() {
                if (typeof getSupabase !== "function") {
                    renderRanking([]);
                    return;
                }
                var team = getCurrentTeam();
                if (!team || !team.id) {
                    renderRanking([]);
                    return;
                }
                rankingSection.style.display = "block";
                var today = new Date().toISOString().slice(0, 10);
                getSupabase().from("players").select("id, name").eq("team_id", team.id).order("name").then(function (playersRes) {
                    var allPlayers = playersRes.data || [];
                    if (allPlayers.length === 0) {
                        renderRanking([]);
                        return;
                    }
                    getSupabase().from("sessions").select("id").eq("team_id", team.id).then(function (sRes) {
                        var sessionIds = (sRes.data || []).map(function (s) { return s.id; });
                        if (sessionIds.length === 0) {
                            var items = allPlayers.map(function (p) {
                                return { name: (p.name && p.name.trim()) ? p.name.trim() : "?", defeats: 0 };
                            }).sort(function (a, b) { return a.defeats - b.defeats; });
                            renderRanking(items);
                            return;
                        }
                        getSupabase().from("rounds").select("loser_player_id, played_at").in("session_id", sessionIds).not("loser_player_id", "is", null).then(function (rRes) {
                            var rounds = (rRes.data || []).filter(function (r) { return r.played_at && r.played_at.slice(0, 10) === today; });
                            var byPlayer = {};
                            rounds.forEach(function (r) {
                                var id = r.loser_player_id;
                                byPlayer[id] = (byPlayer[id] || 0) + 1;
                            });
                            var items = allPlayers.map(function (p) {
                                var name = (p.name && p.name.trim()) ? p.name.trim() : "?";
                                var defeats = byPlayer[p.id] || 0;
                                return { name: name, defeats: defeats };
                            }).sort(function (a, b) { return a.defeats - b.defeats; });
                            renderRanking(items);
                        }).catch(function () { renderRanking([]); });
                    }).catch(function () { renderRanking([]); });
                }).catch(function () { renderRanking([]); });
            }

            function updateButtons() {
                if (typeof getSupabase !== "function") {
                    btnAnmelden.style.display = "block";
                    greetingWrap.style.display = "none";
                    teamSection.style.display = "none";
                    rankingSection.style.display = "none";
                    return;
                }
                getSupabase().auth.getSession().then(function (r) {
                    if (r.data.session) {
                        btnVariante.style.display = "block";
                        btnAnmelden.style.display = "none";
                        getSupabase().from("profiles").select("display_name").eq("user_id", r.data.session.user.id).maybeSingle().then(function (res) {
                            var name = (res.data && res.data.display_name && res.data.display_name.trim()) ? res.data.display_name.trim() : "";
                            greetingEl.innerHTML = name ? "Hallo <span class=\"greeting-name\">" + escapeHtml(name) + "</span>👋" : "Hallo 👋";
                            greetingWrap.style.display = "block";
                        }).catch(function () {
                            greetingEl.innerHTML = "Hallo 👋";
                            greetingWrap.style.display = "block";
                        });
                        updateTeamSection();
                        loadRankingToday();
                    } else {
                        greetingWrap.style.display = "none";
                        teamSection.style.display = "none";
                        rankingSection.style.display = "none";
                        btnAnmelden.style.display = "block";
                        btnVariante.style.display = "none";
                    }
                }).catch(function () {
                    greetingWrap.style.display = "none";
                    teamSection.style.display = "none";
                    rankingSection.style.display = "none";
                    btnAnmelden.style.display = "block";
                    btnVariante.style.display = "none";
                });
            }

            updateButtons();
            if (typeof getSupabase === "function") {
                getSupabase().auth.onAuthStateChange(updateButtons);
            }
            window.addEventListener("storage", function () {
                updateTeamSection();
                if (document.getElementById("rankingList").children.length) loadRankingToday();
            });
        })();
    </script>
</body>
</html>
