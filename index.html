<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="HandClash.png">
    <title>HandClash</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            text-align: center;
            font-family: 'Baloo 2', cursive;
            background-color: #f8fbff;
        }
        body > .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            padding: 16px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 400px;
            width: 100%;
            padding: 24px 20px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .greeting-wrap {
            width: 100%;
            margin: -24px -20px 20px -20px;
            padding: 14px 20px;
            background: linear-gradient(135deg, #e8f2fc 0%, #f0f7ff 100%);
            border-radius: 12px 12px 0 0;
            border-bottom: 1px solid rgba(38, 123, 181, 0.15);
        }
        .greeting {
            font-size: 1.15em;
            color: #1a5d8b;
            margin: 0;
            font-weight: 700;
        }
        .greeting .greeting-name {
            color: #267bb5;
        }
        .logo-img {
            width: 100%;
            max-width: 320px;
            height: auto;
            margin-bottom: 20px;
            display: block;
        }
        .btn {
            width: 100%;
            min-height: 48px;
            box-sizing: border-box;
            text-decoration: none;
            padding: 14px 16px;
            background-color: #267bb5;
            color: white;
            border-radius: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            font-size: 1.1em;
            font-weight: 700;
        }
        .btn:hover {
            background-color: #1a5d8b;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:focus {
            outline: 3px solid #90c2ff;
        }
    </style>
</head>
<body>
    <div id="app-nav"></div>
    <div class="container">
        <div id="greetingWrap" class="greeting-wrap" style="display:none;">
            <p id="greeting" class="greeting"></p>
        </div>
        <img src="HandClash.png" alt="" class="logo-img">
        <a href="login.html?redirect=index.html" class="btn" id="btnAnmelden" style="display:none;">Anmelden</a>
        <a href="ermitteln.html" class="btn" id="btnVariante" style="display:none;">Variante wählen</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="nav.js"></script>
    <script>
        (function () {
            var btnAnmelden = document.getElementById("btnAnmelden");
            var btnVariante = document.getElementById("btnVariante");
            var greetingEl = document.getElementById("greeting");
            var greetingWrap = document.getElementById("greetingWrap");
            function escapeHtml(s) {
                if (!s) return "";
                var div = document.createElement("div");
                div.textContent = s;
                return div.innerHTML;
            }
            function updateButtons() {
                if (typeof getSupabase !== "function") {
                    btnAnmelden.style.display = "block";
                    greetingWrap.style.display = "none";
                    return;
                }
                getSupabase().auth.getSession().then(function (r) {
                    if (r.data.session) {
                        btnVariante.style.display = "block";
                        btnAnmelden.style.display = "none";
                        getSupabase().from("profiles").select("display_name").eq("user_id", r.data.session.user.id).maybeSingle().then(function (res) {
                            var name = (res.data && res.data.display_name && res.data.display_name.trim()) ? res.data.display_name.trim() : "";
                            greetingEl.innerHTML = name ? "Hallo, <span class=\"greeting-name\">" + escapeHtml(name) + "</span>!" : "Hallo!";
                            greetingWrap.style.display = "block";
                        }).catch(function () {
                            greetingEl.innerHTML = "Hallo!";
                            greetingWrap.style.display = "block";
                        });
                    } else {
                        greetingWrap.style.display = "none";
                        btnAnmelden.style.display = "block";
                        btnVariante.style.display = "none";
                    }
                }).catch(function () {
                    greetingWrap.style.display = "none";
                    btnAnmelden.style.display = "block";
                    btnVariante.style.display = "none";
                });
            }
            updateButtons();
            if (typeof getSupabase === "function") {
                getSupabase().auth.onAuthStateChange(updateButtons);
            }
        })();
    </script>
</body>
</html>
