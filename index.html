<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='24' font-size='24' font-family='sans-serif' fill='%23267bb5'%3ESSP%3C/text%3E%3C/svg%3E">
    <title>HandClash</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            text-align: center;
            font-family: 'Baloo 2', cursive;
            background-color: #f8fbff;
        }
        body > .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            padding: 16px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 400px;
            width: 100%;
            padding: 24px 20px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .logo-img {
            width: 100%;
            max-width: 320px;
            height: auto;
            margin-bottom: 20px;
            display: block;
        }
        .btn {
            width: 100%;
            min-height: 48px;
            box-sizing: border-box;
            text-decoration: none;
            padding: 14px 16px;
            background-color: #267bb5;
            color: white;
            border-radius: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            font-size: 1.1em;
            font-weight: 700;
        }
        .btn:hover {
            background-color: #1a5d8b;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:focus {
            outline: 3px solid #90c2ff;
        }
    </style>
</head>
<body>
    <div id="app-nav"></div>
    <div class="container">
        <img src="HandClash.JPG" alt="" class="logo-img">
        <a href="ermitteln.html" class="btn">Variante wählen</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="nav.js"></script>
</body>
</html>
