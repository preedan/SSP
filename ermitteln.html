<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="HandClash.png">
    <title>Variante ermitteln – HandClash</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-bg: #eef4fb;
            --card-bg: #ffffff;
            --card-border: rgba(38, 123, 181, 0.12);
            --primary: #267bb5;
            --primary-dark: #1a5d8b;
            --text: #1f2937;
            --text-muted: #6b7280;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-card: 0 1px 3px rgba(0,0,0,0.06);
        }
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            font-family: 'Baloo 2', cursive;
            background: var(--app-bg);
            -webkit-font-smoothing: antialiased;
        }
        body > .container {
            flex: 1;
            width: 100%;
            min-height: 0;
            box-sizing: border-box;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 16px;
            width: 100%;
            max-width: none;
            padding: 20px;
            box-sizing: border-box;
        }
        .content-inner {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 1;
            min-height: 0;
        }
        .content-inner .scroll-area {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .home-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow-card);
        }
        .home-section.sticky-top {
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .home-section.footer-actions {
            flex-shrink: 0;
        }
        .home-section-title {
            font-size: 0.8em;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin: 0 0 8px 0;
        }
        .btn {
            width: 100%;
            min-height: 52px;
            box-sizing: border-box;
            text-decoration: none;
            padding: 16px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: inherit;
            font-size: 1.15em;
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(38, 123, 181, 0.35);
            cursor: pointer;
        }
        .btn:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(38, 123, 181, 0.4);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:focus {
            outline: 3px solid rgba(38, 123, 181, 0.4);
            outline-offset: 2px;
        }
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .slot-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 24px 16px;
            min-height: 100px;
        }
        .slot-label {
            font-size: 0.85em;
            color: var(--text-muted);
            margin: 0;
        }
        .slot-name {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            min-height: 1.4em;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            background: rgba(38, 123, 181, 0.08);
            transition: transform 0.05s ease-out;
        }
        .slot-name.tick {
            transform: scale(1.03);
        }
        .slot-name.landed {
            animation: slotLanded 0.5s ease-out;
        }
        @keyframes slotLanded {
            0% { transform: scale(1.15); }
            70% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .variant-result-card .variant-title {
            font-size: 1.15em;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 12px 0;
        }
        .variant-result-card .variant-media {
            max-width: 260px;
            margin-left: auto;
            margin-right: auto;
            border-radius: var(--radius-sm);
            overflow: hidden;
            margin-bottom: 12px;
            background: #f8fafc;
        }
        .variant-result-card .variant-media img,
        .variant-result-card .variant-media video {
            display: block;
            width: 100%;
            height: auto;
            max-height: 180px;
            object-fit: cover;
            border-radius: var(--radius-sm);
        }
        .variant-result-card .variant-description {
            font-size: 0.95em;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.4;
        }
        .variant-control-state {
            display: none;
        }
        .variant-control-state.is-active {
            display: block;
        }
        .variant-result-section {
            display: none;
        }
        .variant-result-section.has-result {
            display: block;
        }
        .variant-result-card {
            animation: resultReveal 0.45s ease-out;
        }
        @keyframes resultReveal {
            0% { opacity: 0; transform: scale(0.94); }
            100% { opacity: 1; transform: scale(1); }
        }
        .btn.btn-play {
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }
        .btn.btn-play:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
    <div id="app-nav"></div>
    <div class="container">
        <div class="content-inner">
            <div class="scroll-area">
                <!-- Spiel starten: Variante ermitteln (oben fixiert) -->
                <section class="home-section sticky-top" aria-labelledby="section-spiel-heading">
                    <p id="section-spiel-heading" class="home-section-title">🎲 Spiel starten</p>
                    <div id="variantControlIdle" class="variant-control-state is-active">
                        <button type="button" id="btnErmitteln" class="btn btn-play" disabled>Variante ermitteln</button>
                    </div>
                    <div id="variantControlLoading" class="variant-control-state">
                        <div class="slot-wrap">
                            <p class="slot-label">Variante wird ermittelt…</p>
                            <div id="slotName" class="slot-name" aria-live="polite"></div>
                        </div>
                    </div>
                    <div id="variantResultSection" class="variant-result-section">
                        <div class="variant-result-card">
                            <h2 id="variantName" class="variant-title"></h2>
                            <div class="variant-media" id="variantMediaWrap">
                                <img id="variantImage" src="" alt="" style="display:none;">
                                <video id="variantVideo" controls style="display:none;">
                                    <source src="" type="video/mp4">
                                </video>
                            </div>
                            <p id="variantDescription" class="variant-description"></p>
                        </div>
                    </div>
                </section>
            </div>
            <!-- Runde abschließen: Verlierer eintragen (immer sichtbar am unteren Rand) -->
            <section class="home-section footer-actions" aria-labelledby="section-runde-heading">
                <p id="section-runde-heading" class="home-section-title">☠ Runde abschließen</p>
                <a href="eintragen.html" class="btn">Verlierer eintragen</a>
            </section>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="nav.js"></script>
    <script>
        (function () {
            var contentList = [];
            var rotationInProgress = false;

            var btnErmitteln = document.getElementById("btnErmitteln");
            var variantControlIdle = document.getElementById("variantControlIdle");
            var variantControlLoading = document.getElementById("variantControlLoading");
            var variantResultSection = document.getElementById("variantResultSection");
            var variantNameEl = document.getElementById("variantName");
            var variantImage = document.getElementById("variantImage");
            var variantVideo = document.getElementById("variantVideo");
            var variantDescriptionEl = document.getElementById("variantDescription");

            function setState(idle, loading, hasResult) {
                variantControlIdle.classList.toggle("is-active", idle);
                variantControlLoading.classList.toggle("is-active", loading);
                variantResultSection.classList.toggle("has-result", !!hasResult);
            }

            function loadVariants() {
                if (typeof getSupabase !== "function") {
                    btnErmitteln.disabled = true;
                    return;
                }
                getSupabase()
                    .from("variants")
                    .select("*")
                    .eq("is_active", true)
                    .then(function (res) {
                        var data = res.data || [];
                        contentList = data.map(function (row) {
                            return {
                                type: row.video_url ? "video" : "image",
                                source: row.video_url || row.image_url || "",
                                text: row.name || "",
                                description: row.description || ""
                            };
                        });
                        btnErmitteln.disabled = contentList.length === 0;
                    })
                    .catch(function (err) {
                        console.error("Fehler beim Laden der Varianten:", err);
                        btnErmitteln.disabled = true;
                    });
            }

            function escapeHtml(s) {
                if (!s) return "";
                var div = document.createElement("div");
                div.textContent = s;
                return div.innerHTML;
            }

            var slotNameEl = document.getElementById("slotName");

            function showSelectedVariant(index) {
                var variant = contentList[index];
                variantNameEl.textContent = variant.text || "";
                variantDescriptionEl.textContent = variant.description || "";
                if (variant.type === "image") {
                    variantImage.src = variant.source;
                    variantImage.alt = variant.text || "Variantenbild";
                    variantImage.style.display = "block";
                    variantVideo.style.display = "none";
                } else {
                    variantVideo.querySelector("source").src = variant.source;
                    variantVideo.load();
                    variantVideo.style.display = "block";
                    variantImage.style.display = "none";
                }
                setState(true, false, true);
                btnErmitteln.disabled = false;
                rotationInProgress = false;
            }

            function runSlot(targetIndex) {
                var n = contentList.length;
                if (n === 0) return;
                var delays = [];
                var i;
                for (i = 0; i < 18; i++) delays.push(70);
                delays.push(120, 180, 260, 380, 520);
                var slotIndex = ((targetIndex - (delays.length - 1)) % n + n) % n;
                var tick = 0;

                function next() {
                    if (tick >= delays.length) {
                        slotNameEl.classList.remove("tick");
                        slotNameEl.classList.add("landed");
                        setTimeout(function () {
                            showSelectedVariant(targetIndex);
                        }, 480);
                        return;
                    }
                    slotNameEl.textContent = contentList[slotIndex].text || "?";
                    slotNameEl.classList.remove("landed");
                    slotNameEl.classList.add("tick");
                    setTimeout(function () { slotNameEl.classList.remove("tick"); }, 50);
                    slotIndex = (slotIndex + 1) % n;
                    tick++;
                    setTimeout(next, delays[tick - 1]);
                }
                next();
            }

            function startVariantSelection() {
                if (rotationInProgress || contentList.length === 0) return;
                rotationInProgress = true;
                setState(false, true, false);
                btnErmitteln.disabled = true;
                slotNameEl.textContent = "…";
                slotNameEl.classList.remove("landed");

                var targetIndex = Math.floor(Math.random() * contentList.length);
                runSlot(targetIndex);
            }

            btnErmitteln.addEventListener("click", startVariantSelection);

            document.addEventListener("DOMContentLoaded", loadVariants);
        })();
    </script>
</body>
</html>
