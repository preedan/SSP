<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="HandClash.png">
    <title>Statistik – HandClash</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-bg: #eef4fb;
            --card-bg: #ffffff;
            --card-border: rgba(38, 123, 181, 0.12);
            --primary: #267bb5;
            --primary-dark: #1a5d8b;
            --text: #1f2937;
            --text-muted: #6b7280;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-card: 0 1px 3px rgba(0,0,0,0.06);
        }
        body, html { margin: 0; min-height: 100%; display: flex; flex-direction: column; font-family: 'Baloo 2', cursive; background: var(--app-bg); -webkit-font-smoothing: antialiased; }
        body > .wrap { flex: 1; padding: 16px; width: 100%; max-width: 560px; margin: 0 auto; box-sizing: border-box; }
        .page-title { font-size: 1.3em; font-weight: 700; color: var(--text); margin: 0 0 16px 0; }
        .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-card); }
        .card:last-of-type { margin-bottom: 0; }
        .card h2 { margin: 0 0 8px 0; font-size: 1.1em; font-weight: 700; color: var(--text); }
        .card h2.section-title { margin-top: 20px; }
        .card h2.section-title:first-child { margin-top: 0; }
        .filter-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .filter-header .filter-toggle-btn { padding: 8px 14px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 0.95em; font-weight: 600; cursor: pointer; min-height: 44px; }
        .filter-toggle-btn:hover { background: var(--primary-dark); }
        .filter-toggle-btn[aria-expanded="false"] { background: rgba(38, 123, 181, 0.15); color: var(--primary); }
        .filter-body[hidden] { display: none !important; }
        .filter-body { margin-top: 12px; }
        .filters { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; align-items: end; }
        .filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .filter-group label { font-size: 0.85em; font-weight: 600; color: var(--text-muted); }
        .filter-group select, .filter-group input { padding: 10px 12px; border: 1px solid var(--card-border); border-radius: var(--radius-sm); font-family: inherit; font-size: 16px; min-height: 44px; box-sizing: border-box; width: 100%; background: #fff; }
        .filters .filter-group-btn { grid-column: 1 / -1; }
        .filters .filter-group-btn button { width: 100%; min-height: 48px; padding: 12px 16px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 1em; font-weight: 600; cursor: pointer; }
        .filters .filter-group-btn button:hover { background: var(--primary-dark); }
        .filter-toggle-btn:focus, .filters .filter-group-btn button:focus { outline: 3px solid rgba(38, 123, 181, 0.5); outline-offset: 2px; }
        .filter-summary { font-size: 0.9em; color: var(--text-muted); margin-top: 6px; }
        .summary { font-size: 1em; color: var(--text-muted); margin: 0 0 16px 0; line-height: 1.4; }
        .chart-wrap { margin-bottom: 16px; max-width: 320px; }
        .chart-wrap canvas { max-height: 280px; }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 200px; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; }
        th { background: #f8fafc; font-weight: 700; color: var(--text); font-size: 0.9em; }
        td { color: var(--text); }
        @media (max-width: 520px) { .filters { grid-template-columns: 1fr 1fr; } .filters .filter-group-btn { grid-column: 1 / -1; } }
        .message { padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 16px; }
        .message.loading { background: #e7f3ff; color: var(--text); }
        .message.error { background: #fee; color: #c00; }
        .message.empty { background: #f8fafc; color: var(--text-muted); }
    </style>
</head>
<body>
    <div id="app-nav"></div>
    <div class="wrap">
        <h1 class="page-title">📊 Statistik</h1>
        <div id="message" class="message" style="display:none;"></div>
        <div class="card" id="filterCard">
            <div class="filter-header">
                <h2>🔍 Filter</h2>
                <button type="button" id="filterToggleBtn" class="filter-toggle-btn" aria-expanded="true" aria-controls="filterBody">Filter ausblenden</button>
            </div>
            <p id="filterSummary" class="filter-summary" aria-live="polite" style="display:none;"></p>
            <div id="filterBody" class="filter-body">
                <div class="filters">
                    <div class="filter-group">
                        <label for="filterTeam">👥 Team</label>
                        <select id="filterTeam">
                            <option value="">Alle Teams</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filterVariant">🎲 Variante</label>
                        <select id="filterVariant">
                            <option value="">Alle</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filterFrom">Von</label>
                        <input type="date" id="filterFrom">
                    </div>
                    <div class="filter-group">
                        <label for="filterTo">Bis</label>
                        <input type="date" id="filterTo">
                    </div>
                    <div class="filter-group filter-group-btn">
                        <button type="button" id="applyBtn">Anwenden</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card" id="resultCard" style="display:none;">
            <h2 class="section-title">Überblick</h2>
            <p class="summary" id="summaryText"></p>
            <h2 class="section-title">👤 Verluste pro Spieler</h2>
            <div id="lossesChartWrap" class="chart-wrap"></div>
            <h2 class="section-title">✊ Verluste nach Symbol</h2>
            <p class="summary" id="symbolSummaryText"></p>
            <div id="symbolChartWrap" class="chart-wrap"></div>
            <h2 class="section-title">🎲 Runden pro Variante</h2>
            <div id="variantTableWrap" class="table-wrap"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="supabase-config.js"></script>
    <script src="nav.js"></script>
    <script>
        (function () {
            var messageEl = document.getElementById("message");
            var resultCard = document.getElementById("resultCard");
            var summaryText = document.getElementById("summaryText");
            var lossesChartWrap = document.getElementById("lossesChartWrap");
            var symbolSummaryText = document.getElementById("symbolSummaryText");
            var symbolChartWrap = document.getElementById("symbolChartWrap");
            var lossesChartInstance = null;
            var symbolChartInstance = null;
            var variantTableWrap = document.getElementById("variantTableWrap");
            var filterTeam = document.getElementById("filterTeam");
            var filterVariant = document.getElementById("filterVariant");
            var filterFrom = document.getElementById("filterFrom");
            var filterTo = document.getElementById("filterTo");
            var applyBtn = document.getElementById("applyBtn");
            var filterToggleBtn = document.getElementById("filterToggleBtn");
            var filterBody = document.getElementById("filterBody");
            var filterSummary = document.getElementById("filterSummary");

            var myTeamIds = [];
            var myTeams = [];
            var variants = [];

            function showMessage(text, type) {
                messageEl.textContent = text;
                messageEl.className = "message " + (type || "info");
                messageEl.style.display = "block";
            }

            function updateFilterSummary() {
                var teamOpt = filterTeam.options[filterTeam.selectedIndex];
                var variantOpt = filterVariant.options[filterVariant.selectedIndex];
                var teamText = teamOpt ? teamOpt.text : "Alle Teams";
                var variantText = variantOpt ? variantOpt.text : "Alle";
                var fromVal = filterFrom.value;
                var toVal = filterTo.value;
                var parts = [teamText, variantText];
                if (fromVal || toVal) parts.push((fromVal || "…") + " – " + (toVal || "…"));
                filterSummary.textContent = parts.join(" · ");
            }

            function setFilterOpen(open) {
                var isOpen = !!open;
                filterBody.hidden = !isOpen;
                filterToggleBtn.setAttribute("aria-expanded", isOpen);
                filterToggleBtn.textContent = isOpen ? "Filter ausblenden" : "Filter anzeigen";
                filterSummary.style.display = isOpen ? "none" : "block";
                if (!isOpen) updateFilterSummary();
            }

            function loadFilters() {
                return getSupabase().auth.getUser().then(function (r) {
                    if (!r.data.user) {
                        window.location.href = "login.html?redirect=" + encodeURIComponent("statistik.html");
                        return;
                    }
                    var userId = r.data.user.id;
                    return Promise.all([
                        getSupabase().from("team_members").select("team_id, teams(id, name)").eq("user_id", userId),
                        getSupabase().from("variants").select("id, name").eq("is_active", true).order("name")
                    ]).then(function (results) {
                        var tmRes = results[0];
                        var vRes = results[1];
                        if (tmRes.error) throw tmRes.error;
                        if (vRes.error) throw vRes.error;
                        myTeams = (tmRes.data || []).map(function (row) {
                            var t = row.teams;
                            return t ? { id: t.id, name: t.name } : null;
                        }).filter(Boolean);
                        myTeamIds = myTeams.map(function (t) { return t.id; });
                        variants = vRes.data || [];
                        filterTeam.innerHTML = "<option value=''>Alle Teams</option>" +
                            myTeams.map(function (t) { return "<option value=\"" + (t.id || "") + "\">" + (t.name || "").replace(/</g, "&lt;") + "</option>"; }).join("");
                        filterVariant.innerHTML = "<option value=''>Alle</option>" +
                            variants.map(function (v) { return "<option value=\"" + v.id + "\">" + (v.name || "").replace(/</g, "&lt;") + "</option>"; }).join("");
                        var currentId = null;
                        try {
                            var s = localStorage.getItem("ssp_current_team");
                            var current = s ? JSON.parse(s) : null;
                            if (current && current.id) { currentId = String(current.id); }
                        } catch (e) {}
                        if (currentId) {
                            for (var i = 0; i < filterTeam.options.length; i++) {
                                if (filterTeam.options[i].value === currentId) {
                                    filterTeam.selectedIndex = i;
                                    break;
                                }
                            }
                        }
                        updateFilterSummary();
                        if (window.innerWidth <= 520) setFilterOpen(false);
                    });
                });
            }

            function loadStats() {
                var teamId = filterTeam.value || null;
                var variantId = filterVariant.value || null;
                var fromDate = filterFrom.value || null;
                var toDate = filterTo.value || null;

                showMessage("Lade …", "loading");
                resultCard.style.display = "none";

                var sessionTeamIds = teamId ? [teamId] : myTeamIds;
                if (sessionTeamIds.length === 0) {
                    showMessage("Kein Team ausgewählt. Bitte unter „Meine Teams“ ein Team wählen.", "empty");
                    return;
                }

                getSupabase().from("sessions").select("id, team_id").in("team_id", sessionTeamIds).then(function (sRes) {
                    if (sRes.error) throw sRes.error;
                    var sessionIds = (sRes.data || []).map(function (s) { return s.id; });
                    if (sessionIds.length === 0) {
                        showMessage("Noch keine Runden. Einfach spielen – dann erscheinen hier die Statistiken.", "empty");
                        return;
                    }
                    return getSupabase().from("rounds").select("id, session_id, variant_id, loser_player_id, symbol, played_at, loser:loser_player_id(name), variant:variant_id(name)").in("session_id", sessionIds);
                }).then(function (rRes) {
                    if (rRes.error) throw rRes.error;
                    var rounds = rRes.data || [];

                    if (variantId) rounds = rounds.filter(function (r) { return r.variant_id === variantId; });
                    if (fromDate) rounds = rounds.filter(function (r) { return r.played_at && r.played_at.slice(0, 10) >= fromDate; });
                    if (toDate) rounds = rounds.filter(function (r) { return r.played_at && r.played_at.slice(0, 10) <= toDate; });
                    rounds = rounds.filter(function (r) { return r.loser_player_id != null; });

                    var total = rounds.length;
                    var lossesByPlayer = {};
                    var countByVariant = {};
                    var countBySymbol = { scissors: 0, rock: 0, paper: 0 };
                    var symbolLabels = { scissors: "Schere", rock: "Stein", paper: "Papier" };
                    rounds.forEach(function (r) {
                        var name = (r.loser && r.loser.name) ? r.loser.name : "Unbekannt";
                        if (!lossesByPlayer[name]) lossesByPlayer[name] = 0;
                        lossesByPlayer[name]++;
                        var vname = (r.variant && r.variant.name) ? r.variant.name : "Unbekannt";
                        if (!countByVariant[vname]) countByVariant[vname] = 0;
                        countByVariant[vname]++;
                        var sym = (r.symbol && (r.symbol === "scissors" || r.symbol === "rock" || r.symbol === "paper")) ? r.symbol : null;
                        if (sym) countBySymbol[sym]++;
                    });

                    var lossRows = Object.keys(lossesByPlayer).sort(function (a, b) { return lossesByPlayer[b] - lossesByPlayer[a]; });
                    var variantRows = Object.keys(countByVariant).sort(function (a, b) { return countByVariant[b] - countByVariant[a]; });
                    var symbolOrder = ["scissors", "rock", "paper"];

                    summaryText.textContent = total + " Runden im gewählten Zeitraum.";

                    if (lossesChartInstance) { lossesChartInstance.destroy(); lossesChartInstance = null; }
                    if (symbolChartInstance) { symbolChartInstance.destroy(); symbolChartInstance = null; }

                    if (total === 0) {
                        lossesChartWrap.innerHTML = "<p class=\"message empty\">Keine Runden.</p>";
                    } else {
                        lossesChartWrap.innerHTML = "<canvas id=\"lossesChart\"></canvas>";
                        var lossLabels = lossRows.map(function (name) { return name; });
                        var lossData = lossRows.map(function (name) { return lossesByPlayer[name]; });
                        var palette = ["#267bb5", "#2a9d2a", "#c33", "#e67e22", "#9b59b6", "#1abc9c", "#f1c40f", "#95a5a6"];
                        var lossColors = lossLabels.map(function (_, i) { return palette[i % palette.length]; });
                        lossesChartInstance = new Chart(document.getElementById("lossesChart"), {
                            type: "pie",
                            data: { labels: lossLabels, datasets: [{ data: lossData, backgroundColor: lossColors, borderWidth: 1, borderColor: "#fff" }] },
                            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: "bottom" } } }
                        });
                    }

                    var withSymbol = countBySymbol.scissors + countBySymbol.rock + countBySymbol.paper;
                    symbolSummaryText.textContent = withSymbol === 0
                        ? "Keine Symbole erfasst. Beim Eintragen optional angeben."
                        : total + " Runden, " + withSymbol + " mit Symbol.";
                    if (total === 0) {
                        symbolChartWrap.innerHTML = "";
                    } else {
                        symbolChartWrap.innerHTML = "<canvas id=\"symbolChart\"></canvas>";
                        var symLabels = symbolOrder.map(function (key) { return symbolLabels[key]; });
                        var symData = symbolOrder.map(function (key) { return countBySymbol[key]; });
                        var symColors = ["#5dade2", "#7dcea0", "#f5b041", "#bdc3c7"];
                        symbolChartInstance = new Chart(document.getElementById("symbolChart"), {
                            type: "pie",
                            data: { labels: symLabels, datasets: [{ data: symData, backgroundColor: symColors, borderWidth: 1, borderColor: "#fff" }] },
                            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: "bottom" } } }
                        });
                    }

                    variantTableWrap.innerHTML = total === 0 ? "" : "<table><thead><tr><th>Variante</th><th>Runden</th></tr></thead><tbody>" +
                        variantRows.map(function (name) {
                            return "<tr><td>" + name.replace(/</g, "&lt;") + "</td><td>" + countByVariant[name] + "</td></tr>";
                        }).join("") + "</tbody></table>";

                    resultCard.style.display = "block";
                    messageEl.style.display = "none";
                }).catch(function (err) {
                    showMessage(err.message || "Laden fehlgeschlagen.", "error");
                });
            }

            applyBtn.addEventListener("click", loadStats);
            if (filterToggleBtn && filterBody) {
                filterToggleBtn.addEventListener("click", function () {
                    setFilterOpen(filterBody.hidden);
                });
            }
            filterTeam.addEventListener("change", updateFilterSummary);
            filterVariant.addEventListener("change", updateFilterSummary);
            filterFrom.addEventListener("change", updateFilterSummary);
            filterTo.addEventListener("change", updateFilterSummary);
            loadFilters().then(function () {
                loadStats();
            }).catch(function (err) {
                showMessage(err.message || "Filter laden fehlgeschlagen.", "error");
            });
        })();
    </script>
</body>
</html>
