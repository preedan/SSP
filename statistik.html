<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22%3E%3Ctext x=%2216%22 y=%2224%22 text-anchor=%22middle%22 font-size=%2224%22%3E%E2%9C%8C%EF%B8%8F%3C/text%3E%3C/svg%3E">
    <title>Statistik – SSP</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-bg: #eef4fb;
            --card-bg: #ffffff;
            --card-border: rgba(38, 123, 181, 0.12);
            --primary: #267bb5;
            --primary-dark: #1a5d8b;
            --text: #1f2937;
            --text-muted: #6b7280;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-card: 0 1px 3px rgba(0,0,0,0.06);
        }
        html { height: 100%; }
        body { margin: 0; height: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: 'Baloo 2', cursive; background: var(--app-bg); -webkit-font-smoothing: antialiased; }
        body > .wrap { flex: 1; min-height: 0; padding: 16px; width: 100%; max-width: 560px; margin: 0 auto; box-sizing: border-box; display: flex; flex-direction: column; overflow: hidden; }
        body > .wrap .scroll-area { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
        body > .wrap .scroll-area .result-card-wrap { flex: 1; min-height: 0; width: 100%; display: flex; flex-direction: column; }
        body > .wrap .scroll-area .result-card-wrap .card { margin: 0; width: 100%; flex: 1; min-height: 0; min-width: 0; display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; padding: 16px 20px 16px 16px; }
        body > .wrap .filter-card { flex-shrink: 0; margin-bottom: 16px; padding: 16px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); box-shadow: var(--shadow-card); }
        .page-title { font-size: 1.3em; font-weight: 700; color: var(--text); margin: 0 0 16px 0; }
        .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-card); }
        .card:last-of-type { margin-bottom: 0; }
        .card h2 { margin: 0 0 8px 0; font-size: 1.1em; font-weight: 700; color: var(--text); }
        .card h2.section-title { margin-top: 20px; }
        .card h2.section-title:first-child { margin-top: 0; }
        .filters { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; align-items: end; }
        .filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .filter-group label { font-size: 0.85em; font-weight: 600; color: var(--text-muted); }
        .filter-group select, .filter-group input { padding: 10px 12px; border: 1px solid var(--card-border); border-radius: var(--radius-sm); font-family: inherit; font-size: 16px; min-height: 44px; box-sizing: border-box; width: 100%; background: #fff; }
        .filters .filter-group-btn { grid-column: 1 / -1; }
        .filters .filter-group-btn button { width: 100%; min-height: 48px; padding: 12px 16px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 1em; font-weight: 600; cursor: pointer; }
        .filters .filter-group-btn button:hover { background: var(--primary-dark); }
        .filter-toggle-btn:focus, .filters .filter-group-btn button:focus { outline: 3px solid rgba(38, 123, 181, 0.5); outline-offset: 2px; }
        .summary { font-size: 1em; color: var(--text-muted); margin: 0 0 16px 0; line-height: 1.4; }
        .diagram-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; flex-shrink: 0; min-width: 0; }
        .diagram-nav-title { font-size: 1.1em; font-weight: 700; color: var(--text); margin: 0; flex: 1; min-width: 0; text-align: center; }
        .diagram-nav-btn { width: 44px; height: 44px; min-width: 44px; min-height: 44px; padding: 0; border: none; border-radius: var(--radius-sm); background: rgba(38, 123, 181, 0.15); color: var(--primary); font-size: 1.4em; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .diagram-nav-btn:hover { background: rgba(38, 123, 181, 0.25); }
        .diagram-nav-btn:focus { outline: 3px solid rgba(38, 123, 181, 0.5); outline-offset: 2px; }
        .diagram-slides { flex: 1; min-height: 0; min-width: 0; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .diagram-slide { display: none; flex: 1; min-height: 0; min-width: 0; flex-direction: column; padding: 0; overflow: hidden; }
        .diagram-slide.is-active { display: flex; }
        .diagram-slide .chart-wrap { flex: 1; min-height: 0; min-width: 0; display: flex; align-items: center; justify-content: center; position: relative; margin: 0; max-width: 100%; overflow: hidden; }
        .diagram-slide .chart-wrap canvas { max-width: 100%; max-height: 100%; }
        .diagram-slide .table-wrap { flex: 1; min-height: 0; overflow: auto; -webkit-overflow-scrolling: touch; margin: 0; }
        table { width: 100%; border-collapse: collapse; min-width: 200px; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; }
        th { background: #f8fafc; font-weight: 700; color: var(--text); font-size: 0.9em; }
        td { color: var(--text); }
        @media (max-width: 520px) { .filters { grid-template-columns: 1fr 1fr; } .filters .filter-group-btn { grid-column: 1 / -1; } }
        .message { flex-shrink: 0; padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 16px; }
        .message.loading { background: #e7f3ff; color: var(--text); }
        .message.error { background: #fee; color: #c00; }
        .message.empty { background: #f8fafc; color: var(--text-muted); }
        /* Identisch zu index.html: Hero-Cards (fixiert oben) */
        .hero-row { flex-shrink: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; align-items: stretch; }
        .hero-card { background: linear-gradient(135deg, #e8f2fc 0%, #f0f7ff 100%); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow-card); min-height: 0; }
        .hero-card-title { font-size: 20px; font-weight: 600; color: var(--text); margin: 0 0 4px 0; line-height: 1.3; }
        .hero-card-title .greeting-name { color: var(--primary); }
        .hero-card-sub { font-size: 14px; color: var(--text-muted); margin: 0; line-height: 1.3; }
        @media (max-width: 380px) { .hero-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="app-nav"></div>
    <div class="wrap">
        <div class="hero-row">
            <div class="hero-card">
                <p class="hero-card-title"><span id="statsRoundsCount" class="greeting-name">–</span></p>
                <p class="hero-card-sub">Runden gespielt</p>
            </div>
            <div class="hero-card" id="statsTeamCard">
                <p id="statsTeamName" class="hero-card-title"></p>
                <p id="statsTeamPlayerCount" class="hero-card-sub"></p>
            </div>
        </div>
        <div id="message" class="message" style="display:none;"></div>
        <div class="filter-card">
            <div class="filters">
                <div class="filter-group">
                    <label for="filterFrom">Von (Datum & Uhrzeit)</label>
                    <input type="datetime-local" id="filterFrom">
                </div>
                <div class="filter-group">
                    <label for="filterTo">Bis (Datum & Uhrzeit)</label>
                    <input type="datetime-local" id="filterTo">
                </div>
                <div class="filter-group filter-group-btn">
                    <button type="button" id="applyBtn">Anwenden</button>
                </div>
            </div>
        </div>
        <div class="scroll-area">
            <div class="result-card-wrap">
                <div class="card" id="resultCard" style="display:none;">
                    <div class="diagram-nav">
                        <button type="button" class="diagram-nav-btn" id="diagramPrev" aria-label="Vorheriges Diagramm">‹</button>
                        <h2 class="diagram-nav-title" id="diagramTitle">Niederlagen pro Spieler</h2>
                        <button type="button" class="diagram-nav-btn" id="diagramNext" aria-label="Nächstes Diagramm">›</button>
                    </div>
                    <div class="diagram-slides">
                        <div class="diagram-slide is-active" id="slidePlayer" data-title="Niederlagen pro Spieler">
                            <div id="lossesChartWrap" class="chart-wrap"></div>
                        </div>
                        <div class="diagram-slide" id="slideSymbol" data-title="Niederlagen nach Symbol">
                            <div id="symbolChartWrap" class="chart-wrap"></div>
                        </div>
                        <div class="diagram-slide" id="slideVariant" data-title="Runden pro Variante">
                            <div id="variantTableWrap" class="table-wrap"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="supabase-config.js"></script>
    <script src="nav.js"></script>
    <script>
        (function () {
            if (typeof Chart !== "undefined" && typeof ChartDataLabels !== "undefined") {
                Chart.register(ChartDataLabels);
            }
            var messageEl = document.getElementById("message");
            var resultCard = document.getElementById("resultCard");
            var lossesChartWrap = document.getElementById("lossesChartWrap");
            var symbolChartWrap = document.getElementById("symbolChartWrap");
            var lossesChartInstance = null;
            var symbolChartInstance = null;
            var variantTableWrap = document.getElementById("variantTableWrap");
            var filterFrom = document.getElementById("filterFrom");
            var filterTo = document.getElementById("filterTo");
            var applyBtn = document.getElementById("applyBtn");
            var statsRoundsCount = document.getElementById("statsRoundsCount");
            var statsTeamCard = document.getElementById("statsTeamCard");
            var statsTeamName = document.getElementById("statsTeamName");
            var statsTeamPlayerCount = document.getElementById("statsTeamPlayerCount");
            var diagramTitle = document.getElementById("diagramTitle");
            var diagramPrev = document.getElementById("diagramPrev");
            var diagramNext = document.getElementById("diagramNext");
            var slidePlayer = document.getElementById("slidePlayer");
            var slideSymbol = document.getElementById("slideSymbol");
            var slideVariant = document.getElementById("slideVariant");

            var currentSlideIndex = 0;
            var slideOrder = [slidePlayer, slideSymbol, slideVariant];

            function showSlide(index) {
                currentSlideIndex = (index % slideOrder.length + slideOrder.length) % slideOrder.length;
                for (var i = 0; i < slideOrder.length; i++) {
                    slideOrder[i].classList.toggle("is-active", i === currentSlideIndex);
                }
                if (diagramTitle && slideOrder[currentSlideIndex]) {
                    diagramTitle.textContent = slideOrder[currentSlideIndex].getAttribute("data-title") || "";
                }
                setTimeout(function () {
                    if (lossesChartInstance) lossesChartInstance.resize();
                    if (symbolChartInstance) symbolChartInstance.resize();
                }, 50);
            }

            var myTeamIds = [];
            var myTeams = [];

            function getCurrentTeam() {
                try {
                    var s = localStorage.getItem("ssp_current_team");
                    return s ? JSON.parse(s) : null;
                } catch (e) { return null; }
            }

            function updateStatsTeamCard() {
                var team = getCurrentTeam();
                if (!team || !team.name) {
                    statsTeamName.textContent = "Kein Team";
                    statsTeamPlayerCount.textContent = "Unter „Meine Teams“ wählen";
                    return;
                }
                statsTeamName.textContent = team.name;
                if (!team.id || typeof getSupabase !== "function") {
                    statsTeamPlayerCount.textContent = "";
                    return;
                }
                getSupabase().from("players").select("id").eq("team_id", team.id).then(function (res) {
                    var count = (res.data || []).length;
                    statsTeamPlayerCount.textContent = count === 1 ? "1 Spieler" : count + " Spieler";
                }).catch(function () {
                    statsTeamPlayerCount.textContent = "";
                });
            }

            function showMessage(text, type) {
                messageEl.textContent = text;
                messageEl.className = "message " + (type || "info");
                messageEl.style.display = "block";
            }

            function loadFilters() {
                return getSupabase().auth.getUser().then(function (r) {
                    if (!r.data.user) {
                        window.location.href = "login.html?redirect=" + encodeURIComponent("statistik.html");
                        return;
                    }
                    var userId = r.data.user.id;
                    return getSupabase().from("team_members").select("team_id, teams(id, name)").eq("user_id", userId).then(function (tmRes) {
                        if (tmRes.error) throw tmRes.error;
                        myTeams = (tmRes.data || []).map(function (row) {
                            var t = row.teams;
                            return t ? { id: t.id, name: t.name } : null;
                        }).filter(Boolean);
                        myTeamIds = myTeams.map(function (t) { return t.id; });
                        updateStatsTeamCard();
                    });
                });
            }

            function loadStats() {
                var fromDate = filterFrom.value || null;
                var toDate = filterTo.value || null;

                showMessage("Lade …", "loading");
                if (resultCard) resultCard.style.display = "none";

                var sessionTeamIds = myTeamIds;
                if (sessionTeamIds.length === 0) {
                    if (statsRoundsCount) statsRoundsCount.textContent = "–";
                    showMessage("Kein Team ausgewählt. Bitte unter „Meine Teams“ ein Team wählen.", "empty");
                    return;
                }

                getSupabase().from("sessions").select("id, team_id").in("team_id", sessionTeamIds).then(function (sRes) {
                    if (sRes.error) throw sRes.error;
                    var sessionIds = (sRes.data || []).map(function (s) { return s.id; });
                    if (sessionIds.length === 0) {
                        if (statsRoundsCount) statsRoundsCount.textContent = "0";
                        showMessage("Noch keine Runden. Einfach spielen – dann erscheinen hier die Statistiken.", "empty");
                        return;
                    }
                    return getSupabase().from("rounds").select("id, session_id, variant_id, loser_player_id, symbol, played_at, loser:loser_player_id(name), variant:variant_id(name)").in("session_id", sessionIds);
                }).then(function (rRes) {
                    if (rRes.error) throw rRes.error;
                    var rounds = rRes.data || [];

                    if (fromDate) rounds = rounds.filter(function (r) { return r.played_at && r.played_at.slice(0, 16) >= fromDate.slice(0, 16); });
                    if (toDate) rounds = rounds.filter(function (r) { return r.played_at && r.played_at.slice(0, 16) <= toDate.slice(0, 16); });
                    rounds = rounds.filter(function (r) { return r.loser_player_id != null; });

                    var total = rounds.length;
                    var lossesByPlayer = {};
                    var countByVariant = {};
                    var countBySymbol = { scissors: 0, rock: 0, paper: 0 };
                    var symbolLabels = { scissors: "Schere", rock: "Stein", paper: "Papier" };
                    rounds.forEach(function (r) {
                        var name = (r.loser && r.loser.name) ? r.loser.name : "Unbekannt";
                        if (!lossesByPlayer[name]) lossesByPlayer[name] = 0;
                        lossesByPlayer[name]++;
                        var vname = (r.variant && r.variant.name) ? r.variant.name : "Unbekannt";
                        if (!countByVariant[vname]) countByVariant[vname] = 0;
                        countByVariant[vname]++;
                        var sym = (r.symbol && (r.symbol === "scissors" || r.symbol === "rock" || r.symbol === "paper")) ? r.symbol : null;
                        if (sym) countBySymbol[sym]++;
                    });

                    var lossRows = Object.keys(lossesByPlayer).sort(function (a, b) { return lossesByPlayer[b] - lossesByPlayer[a]; });
                    var variantRows = Object.keys(countByVariant).sort(function (a, b) { return countByVariant[b] - countByVariant[a]; });
                    var symbolOrder = ["scissors", "rock", "paper"];

                    if (statsRoundsCount) statsRoundsCount.textContent = total;

                    if (lossesChartInstance) { lossesChartInstance.destroy(); lossesChartInstance = null; }
                    if (symbolChartInstance) { symbolChartInstance.destroy(); symbolChartInstance = null; }

                    if (total === 0) {
                        lossesChartWrap.innerHTML = "<p class=\"message empty\">Keine Runden.</p>";
                    } else {
                        lossesChartWrap.innerHTML = "<canvas id=\"lossesChart\"></canvas>";
                        var lossLabels = lossRows.slice();
                        var lossData = lossRows.map(function (name) { return lossesByPlayer[name]; });
                        var palette = ["#267bb5", "#3d8fd4", "#5dade2", "#1a5d8b", "#7db3e0", "#2a6b94", "#4a9bc7", "#8bc4e8"];
                        var lossColors = lossLabels.map(function (_, i) { return palette[i % palette.length]; });
                        lossesChartInstance = new Chart(document.getElementById("lossesChart"), {
                            type: "bar",
                            data: { labels: lossLabels, datasets: [{ label: "Niederlagen", data: lossData, backgroundColor: lossColors, borderWidth: 0 }] },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                scales: {
                                    x: { grid: { display: false } },
                                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                                },
                                plugins: {
                                    legend: { display: false },
                                    datalabels: { anchor: "end", align: "end", color: "var(--text)", font: { size: 12 }, formatter: function (value) { return value > 0 ? value : ""; } }
                                }
                            }
                        });
                    }

                    if (total === 0) {
                        symbolChartWrap.innerHTML = "";
                    } else {
                        symbolChartWrap.innerHTML = "<canvas id=\"symbolChart\"></canvas>";
                        var symLabels = symbolOrder.map(function (key) { return symbolLabels[key]; });
                        var symData = symbolOrder.map(function (key) { return countBySymbol[key]; });
                        var symColors = ["#5dade2", "#7dcea0", "#f5b041"];
                        var symTotal = symData.reduce(function (a, b) { return a + b; }, 0);
                        symbolChartInstance = new Chart(document.getElementById("symbolChart"), {
                            type: "pie",
                            data: { labels: symLabels, datasets: [{ data: symData, backgroundColor: symColors, borderWidth: 1, borderColor: "#fff" }] },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: { position: "bottom" },
                                    datalabels: {
                                        color: "#fff",
                                        font: { weight: "bold", size: 14 },
                                        formatter: function (value) {
                                            if (symTotal === 0 || value === 0) return "";
                                            return Math.round((value / symTotal) * 100) + "%";
                                        }
                                    }
                                }
                            }
                        });
                    }

                    variantTableWrap.innerHTML = total === 0 ? "" : "<table><thead><tr><th>Variante</th><th>Runden</th></tr></thead><tbody>" +
                        variantRows.map(function (name) {
                            return "<tr><td>" + name.replace(/</g, "&lt;") + "</td><td>" + countByVariant[name] + "</td></tr>";
                        }).join("") + "</tbody></table>";

                    if (resultCard) resultCard.style.display = "flex";
                    messageEl.style.display = "none";
                    showSlide(0);
                    setTimeout(function () {
                        if (lossesChartInstance) lossesChartInstance.resize();
                        if (symbolChartInstance) symbolChartInstance.resize();
                    }, 100);
                }).catch(function (err) {
                    if (statsRoundsCount) statsRoundsCount.textContent = "–";
                    showMessage(err.message || "Laden fehlgeschlagen.", "error");
                });
            }

            applyBtn.addEventListener("click", loadStats);
            if (diagramPrev) diagramPrev.addEventListener("click", function () { showSlide(currentSlideIndex - 1); });
            if (diagramNext) diagramNext.addEventListener("click", function () { showSlide(currentSlideIndex + 1); });

            loadFilters().then(function () {
                loadStats();
            }).catch(function (err) {
                showMessage(err.message || "Filter laden fehlgeschlagen.", "error");
            });
        })();
    </script>
</body>
</html>
