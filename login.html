<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden – Schere, Stein, Papier</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html { height: 100%; margin: 0; display: flex; justify-content: center; align-items: center; text-align: center; font-family: 'Baloo 2', cursive; background-color: #f0f0f0; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 24px; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 360px; width: 100%; }
        h1 { font-size: 1.5em; margin: 0 0 16px 0; }
        .back-link { position: absolute; top: 10px; left: 10px; font-size: 0.85em; background: #267bb5; color: white; padding: 6px 12px; border-radius: 5px; text-decoration: none; }
        .back-link:hover { background: #1a5d8b; }
        input { width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; font-size: 1em; }
        button { width: 100%; padding: 10px 15px; background: #267bb5; color: white; border: none; border-radius: 5px; font-family: inherit; font-size: 1em; cursor: pointer; }
        button:hover { background: #1a5d8b; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { margin-top: 12px; font-size: 0.9em; color: #333; }
        .message.success { color: #0a0; }
        .message.error { color: #c00; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">Zurück</a>
    <div class="container">
        <h1>Anmelden</h1>
        <p style="margin:0 0 16px 0; color:#555; font-size:0.95em;">E-Mail eingeben – du bekommst einen Link zum Einloggen (kein Passwort).</p>
        <form id="loginForm">
            <input type="email" id="email" placeholder="deine@email.de" required autocomplete="email">
            <button type="submit" id="submitBtn">Magic-Link senden</button>
        </form>
        <div id="message" class="message" aria-live="polite"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        (function () {
            var form = document.getElementById("loginForm");
            var messageEl = document.getElementById("message");
            var submitBtn = document.getElementById("submitBtn");

            function showMessage(text, isError) {
                messageEl.textContent = text;
                messageEl.className = "message " + (isError ? "error" : "success");
            }

            form.addEventListener("submit", async function (e) {
                e.preventDefault();
                var email = document.getElementById("email").value.trim();
                if (!email) return;
                submitBtn.disabled = true;
                messageEl.textContent = "";
                try {
                    var redirectTo = window.location.origin + "/SSP/index.html";
                    if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
                        redirectTo = window.location.origin + "/index.html";
                    }
                    var supabase = getSupabase();
                    var { error } = await supabase.auth.signInWithOtp({
                        email: email,
                        options: { emailRedirectTo: redirectTo }
                    });
                    if (error) throw error;
                    showMessage("E-Mail gesendet! Bitte in deiner Inbox den Link klicken – du wirst dann angemeldet.");
                } catch (err) {
                    showMessage(err.message || "Fehler beim Senden. Bitte E-Mail prüfen.");
                } finally {
                    submitBtn.disabled = false;
                }
            });
        })();
    </script>
</body>
</html>
